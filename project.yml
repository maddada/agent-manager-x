name: AgentManagerX
options:
  bundleIdPrefix: com.madda
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.1
targets:
  AgentManagerX:
    type: application
    platform: macOS
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: "Agent Manager X"
        CFBundleShortVersionString: ${MARKETING_VERSION}
        CFBundleVersion: ${CURRENT_PROJECT_VERSION}
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "Copyright (c) 2026"
        SUAutomaticallyUpdate: true
        SUEnableAutomaticChecks: true
        SUEnableDownloaderService: true
        SUEnableInstallerLauncherService: true
        SUFeedURL: "https://raw.githubusercontent.com/maddada/agent-manager-x/main/appcast.xml"
        SUPublicEDKey: "AGWDPeMqfhmbjt8Pbk+VTC9fDfXAYq+cZoLGCYuGn70="
    dependencies:
      - package: Sparkle
    sources:
      - path: App/Sources
      - path: App/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - native-mini-viewer/**
      - path: App/Resources/native-mini-viewer
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.madda.agentmanagerx
        PRODUCT_NAME: "Agent Manager X"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: KTKP595G3B
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        INFOPLIST_KEY_CFBundleDisplayName: "Agent Manager X"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright (c) 2026"
        MARKETING_VERSION: 2.6
        CURRENT_PROJECT_VERSION: 10
schemes:
  AgentManagerX:
    build:
      targets:
        AgentManagerX: all
    run:
      config: Debug
